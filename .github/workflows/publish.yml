name: publish

# Builds the wheel + sdist and uploads them to PyPI when a GitHub Release is
# published. Uses PyPI Trusted Publishing (OIDC), so no API token is stored.
#
# One-time setup on PyPI: create the project (or a pending publisher) and add a
# trusted publisher for owner "owenpkent", repo "blendmcp", workflow
# "publish.yml", environment "pypi". See
# https://docs.pypi.org/trusted-publishers/
#
# Caveat: this workflow only runs on release, so the upload-artifact and
# download-artifact steps are NOT exercised by CI (tests.yml has no artifact
# steps). Keep those two actions on matching major versions; a mismatch in the
# artifact hand-off would first surface here, at release time, not in PR checks.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Build wheel and sdist
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
