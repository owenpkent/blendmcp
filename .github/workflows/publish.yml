name: publish

# Builds the wheel + sdist and uploads them to PyPI when a GitHub Release is
# published. Uses PyPI Trusted Publishing (OIDC), so no API token is stored.
#
# One-time setup on PyPI: create the project (or a pending publisher) and add a
# trusted publisher for owner "owenpkent", repo "blendmcp", workflow
# "publish.yml", environment "pypi". See
# https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build wheel and sdist
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
